<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptlandia - Lumina AI v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes push-effort { 0%, 100% { transform: translateX(0) rotate(-10deg); } 50% { transform: translateX(10px) rotate(-15deg); } }
        .loader-wrapper { background: #020617; z-index: 100; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .character-push { animation: push-effort 1s ease-in-out infinite; }
        .gear-rotate { animation: gear-spin 3s linear infinite; }
        .loader-hidden { opacity: 0; visibility: hidden; transition: 0.5s; }
        
        .glass-nav { background: rgba(7, 10, 25, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ia-chat-interface { background: radial-gradient(circle at top right, #1e1b4b, #020617); border: 1px solid rgba(99, 102, 241, 0.2); }
        
        .card-prof { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; transition: 0.4s; }
        .card-prof:hover { border-color: #6366f1; transform: translateY(-5px); }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">

    <div id="loader" class="loader-wrapper">
        <div class="flex items-end mb-4">
            <div class="character-push text-6xl text-indigo-500"><i class="fas fa-walking"></i></div>
            <div class="gear-rotate text-7xl text-slate-200"><i class="fas fa-cog"></i></div>
        </div>
        <h2 class="text-xl font-black tracking-widest animate-pulse uppercase text-indigo-400">Lumina AI</h2>
    </div>

    <nav class="fixed top-0 w-full z-40 glass-nav p-4 flex justify-between items-center px-6">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-xl p-2"><i class="fas fa-bars"></i></button>
            <h1 class="text-xl font-black italic text-indigo-500 tracking-tighter">PROMPTLANDIA</h1>
        </div>
        
        <div class="flex bg-slate-900 p-1 rounded-2xl border border-white/5">
            <button onclick="showTab('db')" id="tab-db" class="px-6 py-2.5 rounded-xl bg-indigo-600 text-[10px] font-black uppercase tracking-widest">Database</button>
            <button onclick="showTab('ia')" id="tab-ia" class="px-6 py-2.5 rounded-xl text-slate-400 text-[10px] font-black uppercase tracking-widest">IA Chat</button>
        </div>

        <div class="flex items-center gap-3">
            <select id="langSelect" onchange="updateLang()" class="bg-transparent text-[10px] font-bold border-none outline-none cursor-pointer">
                <option value="pt">PT 🇧🇷</option>
                <option value="en">EN 🇺🇸</option>
                <option value="es">ES 🇪🇸</option>
                <option value="fr">FR 🇫🇷</option>
                <option value="jp">JP 🇯🇵</option>
                <option value="zh">ZH 🇨🇳</option>
            </select>
        </div>
    </nav>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-80 bg-slate-950 z-50 transition-transform -translate-x-full p-8 pt-28 border-r border-white/5 shadow-2xl">
        <h3 id="txt-hist" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-8">Memória Cloud</h3>
        <div id="chatHistory" class="space-y-4"></div>
    </aside>

    <main id="view-db" class="pt-32 px-6 pb-24 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row gap-4 mb-16">
            <input id="search" oninput="renderDB()" type="text" placeholder="Pesquisar entre as 28 profissões..." class="flex-1 p-6 bg-slate-900 rounded-[2rem] border border-white/5 outline-none focus:border-indigo-500">
            <button onclick="randomPrompt()" class="bg-indigo-600 hover:bg-indigo-500 px-8 rounded-[2rem] font-black text-[10px] uppercase tracking-widest">Prompt Aleatório</button>
        </div>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <main id="view-ia" class="hidden pt-32 px-6 pb-10 max-w-4xl mx-auto h-[85vh]">
        <div class="ia-chat-interface rounded-[3rem] h-full flex flex-col overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex items-center justify-between bg-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-robot text-xl"></i></div>
                    <div>
                        <h2 class="font-black text-sm uppercase">Lumina IA Chat</h2>
                        <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">Online</p>
                    </div>
                </div>
                <button onclick="newChat()" class="text-[10px] font-black text-slate-500 hover:text-white uppercase">Novo Chat</button>
            </div>

            <div id="chatBox" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll">
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-indigo-600/20 rounded-xl flex items-center justify-center shrink-0 border border-indigo-500/20"><i class="fas fa-robot text-indigo-400 text-xs"></i></div>
                    <div id="welcome-msg" class="bg-white/5 p-6 rounded-[2rem] rounded-tl-none text-sm leading-relaxed max-w-[85%] border border-white/5">...</div>
                </div>
            </div>

            <div class="p-6 bg-slate-950/40">
                <div class="bg-slate-900 rounded-[2.5rem] border border-white/10 p-2 flex items-center gap-2">
                    <input id="chatInput" type="text" class="flex-1 bg-transparent p-4 outline-none text-sm font-medium ml-4" onkeypress="if(event.key==='Enter') sendToLumina()">
                    <button onclick="sendToLumina()" class="w-14 h-14 bg-indigo-600 rounded-[2rem] hover:scale-105 active:scale-95 transition-all flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="promptModal" class="fixed inset-0 bg-black/95 z-[60] hidden p-6 flex items-center justify-center">
        <div class="bg-[#0b0f1a] w-full max-w-2xl max-h-[85vh] overflow-hidden rounded-[3rem] border border-white/10 flex flex-col">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h2 id="modalTitle" class="text-2xl font-black italic text-indigo-500 uppercase"></h2>
                <button onclick="closeModal()" class="text-3xl text-slate-500 hover:text-white">&times;</button>
            </div>
            <div id="modalContent" class="flex-1 overflow-y-auto p-8 space-y-4 chat-scroll"></div>
        </div>
    </div>

<script>
    const langData = {
        pt: { welcome: "Olá! Sou a Lumina. Em que posso ajudar?", placeholder: "Envie sua mensagem...", hist: "Memória Cloud", copy: "Copiar" },
        en: { welcome: "Hello! I am Lumina. How can I help?", placeholder: "Send your message...", hist: "Cloud Memory", copy: "Copy" },
        es: { welcome: "¡Hola! Soy Lumina. ¿Cómo posso ayudarte?", placeholder: "Envía tu mensaje...", hist: "Memoria Cloud", copy: "Copiar" },
        fr: { welcome: "Bonjour! Je suis Lumina. Comment puis-je vous aider?", placeholder: "Envoyez votre message...", hist: "Mémoire Cloud", copy: "Copier" },
        jp: { welcome: "こんにちは！ルミナです。何かお手伝いしましょうか？", placeholder: "メッセージを送信...", hist: "クラウドメモリ", copy: "コピー" },
        zh: { welcome: "你好！我是 Lumina。我能帮您什么？", placeholder: "发送消息...", hist: "云端记忆", copy: "复制" }
    };

    const professions = [
        { id: 1, icon: 'fa-terminal', name: 'Engenheiro de Prompt' }, { id: 2, icon: 'fa-apple-alt', name: 'Nutricionista' },
        { id: 3, icon: 'fa-graduation-cap', name: 'Professor' }, { id: 4, icon: 'fa-code', name: 'Desenvolvedor' },
        { id: 5, icon: 'fa-gavel', name: 'Advogado' }, { id: 6, icon: 'fa-chart-pie', name: 'Analista de Dados' },
        { id: 7, icon: 'fa-bullhorn', name: 'Social Media' }, { id: 8, icon: 'fa-stethoscope', name: 'Médico' },
        { id: 9, icon: 'fa-camera', name: 'Fotógrafo' }, { id: 10, icon: 'fa-dumbbell', name: 'Personal Trainer' },
        { id: 11, icon: 'fa-utensils', name: 'Chef de Cozinha' }, { id: 12, icon: 'fa-paint-brush', name: 'Designer Gráfico' },
        { id: 13, icon: 'fa-briefcase', name: 'Empreendedor' }, { id: 14, icon: 'fa-music', name: 'Músico' },
        { id: 15, icon: 'fa-language', name: 'Tradutor' }, { id: 16, icon: 'fa-building', name: 'Arquiteto' },
        { id: 17, icon: 'fa-user-shield', name: 'Cybersecurity' }, { id: 18, icon: 'fa-video', name: 'Editor de Vídeo' },
        { id: 19, icon: 'fa-microchip', name: 'Engenheiro de IA' }, { id: 20, icon: 'fa-users', name: 'Recursos Humanos' },
        { id: 21, icon: 'fa-leaf', name: 'Engenheiro Ambiental' }, { id: 22, icon: 'fa-plane-departure', name: 'Turismo' },
        { id: 23, icon: 'fa-calculator', name: 'Contador' }, { id: 24, icon: 'fa-pen-fancy', name: 'Escritor' },
        { id: 25, icon: 'fa-gamepad', name: 'Game Designer' }, { id: 26, icon: 'fa-vial', name: 'Cientista' },
        { id: 27, icon: 'fa-key', name: 'Corretor' }, { id: 28, icon: 'fa-brain', name: 'Psicólogo' }
    ];

    let currentLang = 'pt';
    let history = JSON.parse(localStorage.getItem('lumina_history')) || [];

    window.onload = () => {
        setTimeout(() => document.getElementById('loader').classList.add('loader-hidden'), 2000);
        updateLang();
        renderDB();
        renderHistory();
    };

    function updateLang() {
        currentLang = document.getElementById('langSelect').value;
        const t = langData[currentLang];
        document.getElementById('welcome-msg').innerText = t.welcome;
        document.getElementById('chatInput').placeholder = t.placeholder;
        document.getElementById('txt-hist').innerText = t.hist;
    }

    function showTab(tab) {
        document.getElementById('view-db').classList.toggle('hidden', tab !== 'db');
        document.getElementById('view-ia').classList.toggle('hidden', tab !== 'ia');
        document.getElementById('tab-db').className = tab === 'db' ? 'px-6 py-2.5 rounded-xl bg-indigo-600 text-[10px] font-black uppercase tracking-widest' : 'px-6 py-2.5 rounded-xl text-slate-400 text-[10px] font-black uppercase tracking-widest';
        document.getElementById('tab-ia').className = tab === 'ia' ? 'px-6 py-2.5 rounded-xl bg-indigo-600 text-[10px] font-black uppercase tracking-widest' : 'px-6 py-2.5 rounded-xl text-slate-400 text-[10px] font-black uppercase tracking-widest';
    }

    function renderDB() {
        const query = document.getElementById('search').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = professions.filter(p => p.name.toLowerCase().includes(query)).map(p => `
            <div onclick="openPrompts(${p.id})" class="card-prof p-10 cursor-pointer flex flex-col items-center text-center group">
                <i class="fas ${p.icon} text-3xl text-indigo-500 mb-6 group-hover:scale-110 transition-transform"></i>
                <h3 class="font-black uppercase text-[10px] tracking-widest">${p.name}</h3>
                <p class="text-[8px] text-slate-500 mt-4 font-bold">VER BASE &rarr;</p>
            </div>
        `).join('');
    }

    function openPrompts(id) {
        const prof = professions.find(p => p.id === id);
        document.getElementById('modalTitle').innerText = prof.name;
        
        let promptsHTML = "";
        for(let i = 1; i <= 50; i++) {
            promptsHTML += `
                <div class="bg-white/5 p-5 rounded-2xl border border-white/5 flex justify-between items-center gap-6">
                    <p class="text-xs text-slate-300 italic">#${i} "Comando avançado para ${prof.name} otimizado para IA nível ${i}..."</p>
                    <button onclick="copyPrompt(this)" class="bg-indigo-600 px-4 py-2 rounded-xl text-[8px] font-black uppercase tracking-widest">COPIAR</button>
                </div>`;
        }
        document.getElementById('modalContent').innerHTML = promptsHTML;
        document.getElementById('promptModal').classList.remove('hidden');
    }

    function sendToLumina() {
        const input = document.getElementById('chatInput');
        const box = document.getElementById('chatBox');
        if(!input.value.trim()) return;

        const msg = input.value;
        box.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 p-5 rounded-[2rem] rounded-tr-none text-sm max-w-[80%]">${msg}</div></div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        setTimeout(() => {
            const response = "Como sua IA Lumina, analisei sua dúvida. Sugiro aplicar as técnicas da nossa Database para um resultado 100% preciso.";
            box.innerHTML += `<div class="flex gap-4"><div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0"><i class="fas fa-robot text-xs"></i></div><div class="bg-white/5 p-5 rounded-[2rem] rounded-tl-none text-sm max-w-[80%] border border-white/5">${response}</div></div>`;
            box.scrollTop = box.scrollHeight;
            history.unshift({ title: msg, time: new Date().toLocaleTimeString() });
            localStorage.setItem('lumina_history', JSON.stringify(history));
            renderHistory();
        }, 1200);
    }

    function renderHistory() {
        document.getElementById('chatHistory').innerHTML = history.slice(0, 5).map(h => `
            <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                <p class="text-[10px] font-bold text-indigo-300 truncate">${h.title}</p>
                <p class="text-[8px] opacity-30 mt-1">${h.time}</p>
            </div>
        `).join('');
    }

    function copyPrompt(btn) {
        btn.innerText = "COPIADO";
        btn.classList.add('bg-emerald-600');
        setTimeout(() => { btn.innerText = "COPIAR"; btn.classList.remove('bg-emerald-600'); }, 1500);
    }

    function randomPrompt() { openPrompts(Math.floor(Math.random() * 28) + 1); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    function closeModal() { document.getElementById('promptModal').classList.add('hidden'); }
    function newChat() { document.getElementById('chatBox').innerHTML = ""; }
</script>
</body>
</html>
