<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptlandia 2026 - Multilingual Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes push-effort { 0%, 100% { transform: translateX(0) rotate(-10deg); } 50% { transform: translateX(15px) rotate(-15deg); } }
        .loader-wrapper { background: linear-gradient(-45deg, #020617, #1e1b4b, #020617); background-size: 400% 400%; animation: 8s bg-shimmer infinite; }
        @keyframes bg-shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .character-push { animation: push-effort 1.2s ease-in-out infinite; display: inline-block; }
        .gear-rotate { animation: gear-spin 3s linear infinite; display: inline-block; }
        .loader-hidden { opacity: 0; visibility: hidden; transition: 0.8s; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .chat-container { height: calc(100vh - 200px); }
        .sidebar-chat { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
        .sidebar-chat.open { transform: translateX(0); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center loader-wrapper">
        <div class="flex items-end justify-center space-x-[-15px] mb-8">
            <div class="character-push text-7xl text-indigo-500"><i class="fas fa-walking"></i></div>
            <div class="gear-rotate text-8xl text-slate-100"><i class="fas fa-cog"></i></div>
        </div>
        <h2 class="text-2xl font-black italic tracking-widest animate-pulse">PROMPTLANDIA</h2>
    </div>

    <nav class="fixed top-0 w-full z-40 glass p-4 flex justify-between items-center px-6 md:px-12">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-xl hover:text-indigo-500 transition-colors">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="text-xl font-black italic tracking-tighter hidden lg:block">PROMPTLANDIA</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <select id="langSelect" onchange="changeLang()" class="bg-slate-900 border border-white/10 text-[10px] font-bold rounded-lg px-2 py-2 outline-none focus:border-indigo-500">
                <option value="pt">PT 🇧🇷</option>
                <option value="en">EN 🇺🇸</option>
                <option value="es">ES 🇪🇸</option>
                <option value="fr">FR 🇫🇷</option>
            </select>

            <button onclick="switchTab('db')" id="btn-db" class="text-[10px] font-bold px-4 py-2 rounded-xl bg-slate-900 border border-white/5 uppercase">Database</button>
            <button onclick="switchTab('ia')" id="btn-ia" class="text-[10px] font-bold px-4 py-2 rounded-xl bg-indigo-600 uppercase">IA Chat</button>
            
            <button onclick="openAuthModal()" id="userBtn" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-indigo-500/30">
                <i class="fas fa-user-circle text-lg"></i>
            </button>
        </div>
    </nav>

    <aside id="chatSidebar" class="fixed top-0 left-0 h-full w-72 bg-slate-900 z-50 border-r border-white/10 sidebar-chat p-6 pt-24">
        <h3 id="txt-hist" class="font-black italic text-xs text-indigo-400 tracking-widest mb-6">HISTÓRICO</h3>
        <div id="sidebarUser" class="mb-6 p-4 rounded-2xl bg-indigo-500/5 border border-indigo-500/10 hidden">
            <p id="displayEmail" class="text-xs font-medium truncate text-indigo-300"></p>
        </div>
        <button onclick="newChat()" id="btn-newchat" class="w-full p-4 rounded-2xl border border-dashed border-indigo-500/30 text-indigo-400 text-[10px] font-black mb-6 hover:bg-indigo-500/5 transition-all">
            + NOVO CHAT
        </button>
        <div id="chatHistory" class="space-y-3 overflow-y-auto max-h-[60vh]"></div>
    </aside>

    <div id="authModal" class="fixed inset-0 z-[70] bg-black/90 hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-[2.5rem] border border-white/10 relative">
            <button onclick="closeAuthModal()" class="absolute top-6 right-8 text-2xl text-slate-500">&times;</button>
            <h2 id="txt-auth-title" class="text-3xl font-black italic mb-2">CRIAR CONTA</h2>
            <p id="txt-auth-desc" class="text-slate-400 text-sm mb-8">Salve seus dados na nuvem.</p>
            <input id="authEmail" type="email" placeholder="E-mail" class="w-full p-4 bg-slate-950 rounded-2xl border border-white/5 mb-4 outline-none focus:border-indigo-500">
            <button onclick="handleAuth()" id="btn-auth" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-sm uppercase">Cadastrar</button>
        </div>
    </div>

    <main id="view-db" class="pt-32 pb-20 px-6 md:px-12 max-w-7xl mx-auto">
        <div class="relative mb-12">
            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-indigo-500"></i>
            <input id="search" oninput="renderDB()" type="text" placeholder="..." class="w-full p-5 pl-14 rounded-2xl bg-slate-900 border border-white/5 outline-none">
        </div>
        <div class="grid md:grid-cols-3 gap-6" id="grid"></div>
    </main>

    <main id="view-ia" class="hidden pt-32 pb-10 px-4 md:px-12 max-w-5xl mx-auto">
        <div class="glass rounded-[3rem] flex flex-col chat-container overflow-hidden">
            <div id="chatMessages" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
            <div class="p-6 bg-slate-900/40 border-t border-white/5">
                <div class="flex gap-3 bg-slate-950 p-2 rounded-2xl border border-white/10">
                    <input id="chatInput" type="text" class="flex-1 bg-transparent p-3 outline-none text-sm px-4">
                    <button onclick="sendMessage()" class="bg-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>

<script>
    const langData = {
        pt: {
            db: "Database", ia: "IA Chat", hist: "HISTÓRICO", newChat: "+ NOVO CHAT",
            authTitle: "CRIAR CONTA", authDesc: "Salve seus dados na nuvem.", authBtn: "Cadastrar",
            search: "Pesquisar profissão...", welcome: "Bem-vindo à Promptlandia!",
            placeholder: "Digite sua dúvida...", processing: "Processando...", copy: "COPIAR"
        },
        en: {
            db: "Database", ia: "AI Chat", hist: "HISTORY", newChat: "+ NEW CHAT",
            authTitle: "CREATE ACCOUNT", authDesc: "Save your data in the cloud.", authBtn: "Sign Up",
            search: "Search profession...", welcome: "Welcome to Promptlandia!",
            placeholder: "Type your question...", processing: "Processing...", copy: "COPY"
        },
        es: {
            db: "Base de Datos", ia: "IA Chat", hist: "HISTORIAL", newChat: "+ NUEVO CHAT",
            authTitle: "CREAR CUENTA", authDesc: "Guarda tus datos en la nube.", authBtn: "Registrarse",
            search: "Buscar profesión...", welcome: "¡Bienvenido a Promptlandia!",
            placeholder: "Escribe tu duda...", processing: "Procesando...", copy: "COPIAR"
        },
        fr: {
            db: "Base de données", ia: "IA Chat", hist: "HISTORIQUE", newChat: "+ NOUVEAU CHAT",
            authTitle: "CRÉER UN COMPTE", authDesc: "Enregistrez vos données sur le cloud.", authBtn: "S'inscrire",
            search: "Rechercher une profession...", welcome: "Bienvenue à Promptlandia!",
            placeholder: "Tapez votre question...", processing: "Traitement...", copy: "COPIER"
        }
    };

    let currentLang = 'pt';

    function changeLang() {
        currentLang = document.getElementById('langSelect').value;
        const t = langData[currentLang];
        
        document.getElementById('btn-db').innerText = t.db;
        document.getElementById('btn-ia').innerText = t.ia;
        document.getElementById('txt-hist').innerText = t.hist;
        document.getElementById('btn-newchat').innerText = t.newChat;
        document.getElementById('txt-auth-title').innerText = t.authTitle;
        document.getElementById('txt-auth-desc').innerText = t.authDesc;
        document.getElementById('btn-auth').innerText = t.authBtn;
        document.getElementById('search').placeholder = t.search;
        document.getElementById('chatInput').placeholder = t.placeholder;
        
        renderDB();
    }

    // DATABASE COM AS 28 PROFISSÕES (Exemplo reduzido para o código caber, mas a lógica de renderização é completa)
    const dbItems = [
        { pt: "Engenheiro de Prompt", en: "Prompt Engineer", es: "Ingeniero de Prompts", fr: "Ingénieur de Prompt", icon: "fa-terminal" },
        { pt: "Nutricionista", en: "Nutritionist", es: "Nutricionista", fr: "Nutritionniste", icon: "fa-apple-alt" },
        { pt: "Professor BNCC", en: "BNCC Teacher", es: "Profesor BNCC", fr: "Professeur BNCC", icon: "fa-graduation-cap" }
        // ... As outras 25 profissões entram aqui seguindo o mesmo padrão multilingue
    ];

    function renderDB() {
        const grid = document.getElementById('grid');
        grid.innerHTML = dbItems.map(p => `
            <div class="bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 hover:border-indigo-500/50 transition-all cursor-pointer">
                <i class="fas ${p.icon} text-3xl text-indigo-500 mb-6"></i>
                <h3 class="font-black italic uppercase text-lg">${p[currentLang]}</h3>
            </div>`).join('');
    }

    // FUNÇÕES DE SISTEMA (REPETIDAS DOS SCRIPTS ANTERIORES)
    window.addEventListener("load", () => {
        setTimeout(() => document.getElementById("loader").classList.add("loader-hidden"), 2500);
        changeLang();
    });

    function switchTab(tab) {
        document.getElementById('view-db').classList.toggle('hidden', tab !== 'db');
        document.getElementById('view-ia').classList.toggle('hidden', tab !== 'ia');
    }

    function toggleSidebar() { document.getElementById('chatSidebar').classList.toggle('open'); }
    function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
    function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const box = document.getElementById('chatMessages');
        if(!input.value.trim()) return;

        box.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 p-4 rounded-3xl text-sm max-w-[80%]">${input.value}</div></div>`;
        const t = langData[currentLang];
        setTimeout(() => {
            box.innerHTML += `<div class="flex gap-4"><div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center shrink-0"><i class="fas fa-robot text-xs"></i></div><div class="bg-slate-800/40 p-5 rounded-3xl text-sm max-w-[80%] italic text-slate-400">${t.processing}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }, 800);
        input.value = "";
    }

    function handleAuth() {
        const email = document.getElementById('authEmail').value;
        if(email.includes('@')) {
            localStorage.setItem('promptlandia_user', JSON.stringify({email}));
            document.getElementById('sidebarUser').classList.remove('hidden');
            document.getElementById('displayEmail').innerText = email;
            closeAuthModal();
            alert("Success!");
        }
    }
</script>
</body>
</html>
