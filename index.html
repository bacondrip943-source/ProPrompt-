<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPrompt - Seu Diretório de IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center py-10">
            <h1 class="text-4xl font-bold text-blue-400">🚀 ProPrompt</h1>
            <p class="text-slate-400 mt-2">O seu diretório de prompts profissionais gerado por IA.</p>
        </header>

        <main class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">Destaque do Dia</h2>
            <div class="space-y-4">
                <div class="bg-slate-700 p-4 rounded-xl">
                    <h3 class="font-bold text-blue-300">Prompt para Professores</h3>
                    <p class="text-sm text-slate-300 mt-1">Crie planos de aula completos em segundos.</p>
                    <button class="mt-3 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold w-full transition">Copiar Prompt</button>
                </div>
            </div>
        </main>

        <footer class="text-center mt-10 text-slate-500 text-xs">
            <p>100% Gerado por IA • Sem custos de propaganda</p>
        </footer>
    </div>
</body>
</html>
