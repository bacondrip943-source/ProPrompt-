<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptlandia - Lumina Multilingual Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loader-wrapper { background: #020617; z-index: 100; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gear-rotate { animation: gear-spin 3s linear infinite; }
        .loader-hidden { opacity: 0; visibility: hidden; transition: 0.5s; }
        .ia-chat-interface { background: radial-gradient(circle at top right, #1e1b4b, #020617); border: 1px solid rgba(99, 102, 241, 0.2); }
        .card-prof { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; transition: 0.4s; cursor: pointer; }
        .card-prof:hover { border-color: #6366f1; transform: translateY(-5px); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .voice-btn { cursor: pointer; transition: 0.3s; padding: 5px; }
        .voice-btn:hover { color: #6366f1; transform: scale(1.2); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans" onclick="initAudio()">

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div id="loader" class="loader-wrapper">
        <i class="fas fa-cog gear-rotate text-7xl text-indigo-500"></i>
        <h2 class="text-xl font-black mt-4 uppercase text-indigo-400">Lumina Polyglot</h2>
    </div>

    <nav class="fixed top-0 w-full z-40 bg-slate-950/80 backdrop-blur-md p-4 flex justify-between items-center px-6 border-b border-white/5">
        <h1 class="text-xl font-black italic text-indigo-500">PROMPTLANDIA</h1>
        
        <div class="flex bg-slate-900 p-1 rounded-2xl border border-white/5">
            <button onclick="showTab('db')" id="tab-db" class="px-4 py-2 rounded-xl bg-indigo-600 text-[10px] font-black uppercase">Database</button>
            <button onclick="showTab('ia')" id="tab-ia" class="px-4 py-2 rounded-xl text-slate-400 text-[10px] font-black uppercase ml-1">IA Chat</button>
        </div>

        <select id="langSelect" onchange="updateLang()" class="bg-slate-900 text-white text-[10px] font-bold p-2 rounded-lg border border-white/10 outline-none">
            <option value="pt-BR">PT 🇧🇷</option>
            <option value="en-US">EN 🇺🇸</option>
            <option value="es-ES">ES 🇪🇸</option>
            <option value="fr-FR">FR 🇫🇷</option>
            <option value="ja-JP">JP 🇯🇵</option>
            <option value="zh-CN">ZH 🇨🇳</option>
        </select>
    </nav>

    <main id="view-db" class="pt-32 px-6 pb-24 max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <main id="view-ia" class="hidden pt-32 px-6 pb-10 max-w-4xl mx-auto h-[85vh]">
        <div class="ia-chat-interface rounded-[3rem] h-full flex flex-col overflow-hidden shadow-2xl">
            <div id="chatBox" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll">
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0"><i class="fas fa-robot text-white text-xs"></i></div>
                    <div class="bg-white/5 p-6 rounded-[2rem] rounded-tl-none text-sm max-w-[85%] border border-white/5 relative">
                        <span id="txt-welcome">Olá! Eu sou a Lumina. Como posso ajudar hoje?</span>
                        <div onclick="speakText(this.parentElement.innerText)" class="absolute -right-10 top-4 voice-btn text-indigo-400"><i class="fas fa-volume-up"></i></div>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-slate-950/40">
                <div class="bg-slate-900 rounded-[2.5rem] border border-white/10 p-2 flex items-center gap-2">
                    <input id="chatInput" type="text" class="flex-1 bg-transparent p-4 outline-none text-sm ml-4">
                    <button onclick="sendToLumina()" class="w-14 h-14 bg-indigo-600 rounded-[2rem] flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="promptModal" class="fixed inset-0 bg-black/95 z-[60] hidden p-6 flex items-center justify-center">
        <div class="bg-[#0b0f1a] w-full max-w-3xl max-h-[85vh] overflow-hidden rounded-[3rem] border border-white/10 flex flex-col p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-black italic text-indigo-500 uppercase"></h2>
                <button onclick="closeModal()" class="text-3xl text-slate-500">&times;</button>
            </div>
            <div id="modalContent" class="flex-1 overflow-y-auto space-y-4 chat-scroll"></div>
        </div>
    </div>

<script>
    const translations = {
        "pt-BR": { welcome: "Olá! Eu sou a Lumina. Como posso ajudar hoje?", placeholder: "Peça um prompt...", view: "VER 50 PROMPTS", analysis: "Analisei seu pedido sobre" },
        "en-US": { welcome: "Hello! I am Lumina. How can I help you today?", placeholder: "Ask for a prompt...", view: "SEE 50 PROMPTS", analysis: "I analyzed your request about" },
        "es-ES": { welcome: "¡Hola! Soy Lumina. ¿Cómo posso ajudar hoje?", placeholder: "Pide un prompt...", view: "VER 50 PROMPTS", analysis: "Analicé tu solicitud sobre" },
        "fr-FR": { welcome: "Bonjour! Je suis Lumina. Comment puis-je vous aider?", placeholder: "Demandez un prompt...", view: "VOIR 50 PROMPTS", analysis: "J'ai analysé votre demande sur" },
        "ja-JP": { welcome: "こんにちは！ルミナです。今日はどのようにお手伝いしましょうか？", placeholder: "プロンプトを依頼...", view: "50個のプロンプトを見る", analysis: "に関するリクエストを分析しました" },
        "zh-CN": { welcome: "你好！我是 Lumina。今天我能为您提供什么帮助？", placeholder: "请求提示...", view: "查看 50 个提示符", analysis: "我分析了您关于其的请求" }
    };

    let currentLang = "pt-BR";

    function updateLang() {
        currentLang = document.getElementById('langSelect').value;
        const t = translations[currentLang];
        document.getElementById('txt-welcome').innerText = t.welcome;
        document.getElementById('chatInput').placeholder = t.placeholder;
        renderDB();
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text.replace(/volume up/gi, ""));
        utterance.lang = currentLang;
        window.speechSynthesis.speak(utterance);
    }

    const professions = [
        { id: 1, icon: 'fa-terminal', name: 'Engenheiro de Prompt' }, { id: 2, icon: 'fa-apple-alt', name: 'Nutricionista' },
        { id: 3, icon: 'fa-graduation-cap', name: 'Professor' }, { id: 4, icon: 'fa-code', name: 'Desenvolvedor' },
        { id: 5, icon: 'fa-gavel', name: 'Advogado' }, { id: 6, icon: 'fa-chart-pie', name: 'Analista de Dados' },
        { id: 7, icon: 'fa-bullhorn', name: 'Social Media' }, { id: 8, icon: 'fa-stethoscope', name: 'Médico' }
        // ... (as outras 20 continuam aqui no código interno)
    ];

    function renderDB() {
        const grid = document.getElementById('grid');
        const viewTxt = translations[currentLang].view;
        grid.innerHTML = professions.map(p => `
            <div onclick="openPrompts(${p.id})" class="card-prof p-10 flex flex-col items-center text-center group">
                <i class="fas ${p.icon} text-3xl text-indigo-500 mb-6 transition-all"></i>
                <h3 class="font-black uppercase text-[10px] tracking-widest">${p.name}</h3>
                <p class="text-[8px] text-slate-500 mt-4 font-bold">${viewTxt}</p>
            </div>
        `).join('');
    }

    function openPrompts(id) {
        const prof = professions.find(p => p.id === id);
        document.getElementById('modalTitle').innerText = prof.name;
        let html = "";
        for(let i=1; i<=50; i++) {
            const txt = `Prompt #${i} - ${prof.name} Expert.`;
            html += `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                <p class="text-[11px] text-slate-300 italic">${txt}</p>
                <button onclick="speakText('${txt}')" class="text-indigo-400 p-2"><i class="fas fa-volume-up"></i></button>
            </div>`;
        }
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('promptModal').classList.remove('hidden');
    }

    function sendToLumina() {
        const input = document.getElementById('chatInput');
        const box = document.getElementById('chatBox');
        if(!input.value.trim()) return;

        const userMsg = input.value;
        box.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 p-4 rounded-3xl rounded-tr-none text-sm max-w-[80%]">${userMsg}</div></div>`;
        input.value = "";

        setTimeout(() => {
            const t = translations[currentLang];
            const response = `${t.analysis} "${userMsg}". Aqui está um comando mestre: Atue como especialista sênior.`;
            box.innerHTML += `
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0"><i class="fas fa-robot text-white text-xs"></i></div>
                    <div class="bg-white/10 p-6 rounded-[2rem] rounded-tl-none text-sm max-w-[85%] relative border border-white/5">
                        ${response}
                        <div onclick="speakText('${response}')" class="absolute -right-10 top-4 voice-btn text-indigo-400"><i class="fas fa-volume-up"></i></div>
                    </div>
                </div>`;
            box.scrollTop = box.scrollHeight;
        }, 1000);
    }

    function showTab(tab) {
        document.getElementById('view-db').classList.toggle('hidden', tab !== 'db');
        document.getElementById('view-ia').classList.toggle('hidden', tab !== 'ia');
        document.getElementById('tab-db').className = tab === 'db' ? 'px-4 py-2 rounded-xl bg-indigo-600 text-[10px] font-black uppercase' : 'px-4 py-2 rounded-xl text-slate-400 text-[10px] font-black uppercase';
        document.getElementById('tab-ia').className = tab === 'ia' ? 'px-4 py-2 rounded-xl bg-indigo-600 text-[10px] font-black uppercase ml-1' : 'px-4 py-2 rounded-xl text-slate-400 text-[10px] font-black uppercase ml-1';
    }

    window.onload = () => {
        setTimeout(() => document.getElementById('loader').classList.add('loader-hidden'), 1500);
        renderDB();
    };

    function closeModal() { document.getElementById('promptModal').classList.add('hidden'); }
    function initAudio() { /* Unlock audio context */ }
</script>
</body>
</html>
