<script>

// ============================
// CONFIG OPENAI
// ============================

const API_KEY = "SUA_API_KEY_AQUI";

// ============================
// IA PRINCIPAL
// ============================

async function askAI(){

    const question =
    document.getElementById("userQuestion").value;

    const result =
    document.getElementById("aiResult");

    if(question.trim() === ""){
        result.innerHTML =
        "Digite uma pergunta.";
        return;
    }

    result.innerHTML = "Pensando...";

    try{

        const response = await fetch(
        "https://api.openai.com/v1/chat/completions",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + API_KEY
            },

            body:JSON.stringify({
                model:"gpt-4o-mini",
                messages:[
                    {
                        role:"system",
                        content:
                        "Você é um professor inteligente que ajuda estudantes."
                    },
                    {
                        role:"user",
                        content:question
                    }
                ]
            })
        });

        const data = await response.json();

        const aiText =
        data.choices[0].message.content;

        result.innerHTML = aiText;

    }catch(error){

        result.innerHTML =
        "Erro ao conectar com a IA.";

    }

}

// ============================
// GERADOR DE CONTAS
// ============================

let currentAnswer = 0;
let currentQuestion = "";

function generateMath(){

    const operation =
    document.getElementById("operation").value;

    let n1 = Math.floor(Math.random()*100);
    let n2 = Math.floor(Math.random()*100);

    if(operation === "divisao"){
        n2 = Math.floor(Math.random()*9)+1;
    }

    if(operation === "soma"){
        currentQuestion = `${n1} + ${n2}`;
        currentAnswer = n1 + n2;
    }

    if(operation === "subtracao"){
        currentQuestion = `${n1} - ${n2}`;
        currentAnswer = n1 - n2;
    }

    if(operation === "multiplicacao"){
        currentQuestion = `${n1} × ${n2}`;
        currentAnswer = n1 * n2;
    }

    if(operation === "divisao"){
        currentQuestion = `${n1*n2} ÷ ${n2}`;
        currentAnswer = n1;
    }

    document.getElementById("mathResult").innerHTML =
    `
    <h3>${currentQuestion}</h3>

    <input
        type="number"
        id="userMathAnswer"
        placeholder="Digite sua resposta"
    >

    <button onclick="checkMathAnswer()">
        Verificar Resposta
    </button>

    <div id="mathFeedback"></div>
    `;
}

// ============================
// VERIFICAR RESPOSTA
// ============================

function checkMathAnswer(){

    const userAnswer =
    Number(document.getElementById(
    "userMathAnswer").value);

    const feedback =
    document.getElementById("mathFeedback");

    if(userAnswer === currentAnswer){

        feedback.innerHTML =
        `
        <div style="
            margin-top:15px;
            background:#16a34a;
            padding:15px;
            border-radius:10px;
        ">
            ✅ RESPOSTA EXATA!
        </div>
        `;

    }else{

        feedback.innerHTML =
        `
        <div style="
            margin-top:15px;
            background:#dc2626;
            padding:15px;
            border-radius:10px;
        ">
            ❌ Você errou.

            <br><br>

            Resposta correta:
            <b>${currentAnswer}</b>

            <br><br>

            Você provavelmente:
            <br>
            • Errou a conta
            <br>
            • Confundiu os sinais
            <br>
            • Digitou errado
        </div>
        `;

    }

}

// ============================
// GERADOR IA DE PERGUNTAS
// ============================

async function generateQuestions(){

    const subject =
    document.getElementById("subject").value;

    const text =
    document.getElementById("textBase").value;

    const result =
    document.getElementById("questionResult");

    if(text.trim() === ""){

        result.innerHTML =
        "Digite ou cole um texto.";

        return;
    }

    result.innerHTML =
    "Gerando perguntas inteligentes...";

    try{

        const response = await fetch(
        "https://api.openai.com/v1/chat/completions",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + API_KEY
            },

            body:JSON.stringify({

                model:"gpt-4o-mini",

                messages:[

                    {
                        role:"system",
                        content:
                        `
                        Você cria perguntas escolares inteligentes.
                        Gere perguntas EXATAMENTE sobre o texto enviado.
                        `
                    },

                    {
                        role:"user",
                        content:
                        `
                        Matéria:
                        ${subject}

                        Texto:
                        ${text}

                        Gere 5 perguntas.
                        `
                    }

                ]

            })

        });

        const data = await response.json();

        const aiQuestions =
        data.choices[0].message.content;

        result.innerHTML = aiQuestions;

    }catch(error){

        result.innerHTML =
        "Erro ao gerar perguntas.";

    }

}

</script>
